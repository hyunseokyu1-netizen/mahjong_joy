name: mahjong_joy
description: "짝 맞추기의 재미만 남긴 심플 마작 — AI 대전과 LAN 멀티플레이."
publish_to: 'none'
version: 1.2.0+5

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# 앱 아이콘 (원본은 tool/gen_icon.py로 생성)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#D3F0E4"
  adaptive_icon_foreground: assets/icon/icon_foreground.png

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
